<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Coach Hany - Fitness & Personal Trainer</title>
     <link rel="icon" type="image/png" sizes="32x32" href="https://mentra-tech.pages.dev/assets/logo.png">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Custom CSS for Premium Fitness Look & Responsiveness -->
  <style>
    :root {
      --primary-color: #ff4500;
      --dark-bg: #111111;
      --card-bg: #1a1a1a;
      --text-light: #f8f9fa;
    }

    body {
      background-color: var(--dark-bg);
      color: var(--text-light);
      font-family: 'Cairo', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    html[lang="en"] body {
      font-family: 'Oswald', sans-serif;
      letter-spacing: 0.5px;
    }

    [x-cloak] { display: none !important; }

    /* Navbar */
    .site-navbar {
      background: rgba(17, 17, 17, 0.98);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 10px 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
    .site-logo {
      font-weight: 900;
      color: var(--primary-color);
      text-transform: uppercase;
      font-size: 1.8rem;
      text-decoration: none;
    }
    .nav-link {
      color: white !important;
      font-weight: 600;
      text-transform: uppercase;
      transition: 0.3s;
      padding: 10px 15px !important;
    }
    .nav-link:hover {
      color: var(--primary-color) !important;
    }

    /* Mobile Menu Style */
    #mobileMenu {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: rgba(17, 17, 17, 0.98);
      border-top: 1px solid #333;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    /* Language Toggle */
    .lang-toggle {
      background: transparent;
      border: 2px solid var(--primary-color);
      color: var(--primary-color);
      padding: 6px 20px;
      border-radius: 5px;
      font-weight: 700;
      transition: 0.3s;
      cursor: pointer;
    }
    .lang-toggle:hover {
      background: var(--primary-color);
      color: white;
    }

    /* Hero Section (Fixed for Mobile Browsers) */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
      position: relative;
      padding-top: 80px; /* offset for navbar */
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(17,17,17,0.95), rgba(17,17,17,0.5));
    }
    html[dir="rtl"] .hero::before {
      background: linear-gradient(to left, rgba(17,17,17,0.95), rgba(17,17,17,0.5));
    }
    .hero-content {
      position: relative;
      z-index: 1;
    }
    
    /* Responsive Typography */
    .hero h1 {
      font-size: 2.5rem; /* Mobile Size */
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.3;
    }
    @media (min-width: 768px) {
      .hero h1 { font-size: 4.5rem; } /* PC Size */
    }
    .hero h1 span {
      color: var(--primary-color);
    }

    /* Buttons */
    .btn-custom {
      background: var(--primary-color);
      color: white;
      padding: 15px 30px;
      font-weight: bold;
      text-transform: uppercase;
      border: none;
      border-radius: 5px;
      transition: all 0.3s;
      display: inline-block;
      width: 100%;
      text-align: center;
    }
    @media (min-width: 768px) {
      .btn-custom { width: auto; }
    }
    .btn-custom:hover {
      background: white;
      color: var(--dark-bg);
      transform: translateY(-3px);
    }
    .btn-whatsapp {
      background: #25D366;
      color: white;
      border-radius: 5px;
      padding: 15px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-whatsapp:hover {
      background: #128C7E;
      color: white;
      transform: translateY(-3px);
    }

    /* Section Titles */
    .section-title {
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 2rem;
      position: relative;
      display: inline-block;
    }
    .section-title::after {
      content: '';
      position: absolute;
      width: 50%;
      height: 4px;
      background: var(--primary-color);
      bottom: -10px;
      left: 25%;
    }

    /* Cards */
    .service-card {
      background: var(--card-bg);
      padding: 30px 20px;
      border-radius: 10px;
      border-bottom: 4px solid transparent;
      transition: 0.3s;
      height: 100%;
    }
    .service-card:hover {
      border-color: var(--primary-color);
      transform: translateY(-5px);
    }
    .service-icon {
      font-size: 3rem;
      color: var(--primary-color);
      margin-bottom: 15px;
    }

    /* Gallery */
    .gallery-img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      transition: 0.3s;
    }
    @media (min-width: 768px) {
      .gallery-img { filter: grayscale(50%); height: 300px; }
      .gallery-item:hover .gallery-img { filter: grayscale(0%); transform: scale(1.05); }
    }
    .gallery-item {
      overflow: hidden;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    /* Forms */
    .form-control {
      background: var(--card-bg);
      border: 1px solid #333;
      color: white;
      padding: 15px;
      border-radius: 5px;
    }
    .form-control:focus {
      background: #222;
      color: white;
      border-color: var(--primary-color);
      box-shadow: none;
    }
  </style>
</head>

<body x-data="fitnessApp()">

  <!-- Navbar -->
  <nav class="site-navbar fixed-top">
    <div class="container d-flex justify-content-between align-items-center position-relative">
      <a href="#" class="site-logo" x-text="t[lang].logo"></a>
      
      <!-- Desktop Menu -->
      <div class="d-none d-lg-flex gap-3 align-items-center">
        <a href="#home" class="nav-link" x-text="t[lang].navHome"></a>
        <a href="#about" class="nav-link" x-text="t[lang].navAbout"></a>
        <a href="#services" class="nav-link" x-text="t[lang].navServices"></a>
        <a href="#gallery" class="nav-link" x-text="t[lang].navGallery"></a>
        <a href="#contact" class="nav-link" x-text="t[lang].navContact"></a>
      </div>

      <button @click="toggleLang()" class="lang-toggle d-none d-lg-block">
        <span x-show="lang === 'en'">عربي</span>
        <span x-show="lang === 'ar'">EN</span>
      </button>

      <!-- Mobile Menu Button -->
      <button class="btn btn-outline-light d-lg-none" type="button" @click="mobileMenuOpen = !mobileMenuOpen">
        <i class="bi bi-list fs-1"></i>
      </button>
    </div>
    
    <!-- Mobile Menu Overlay -->
    <div x-show="mobileMenuOpen" x-transition.opacity id="mobileMenu" class="d-lg-none p-4">
      <a href="#home" @click="mobileMenuOpen = false" class="d-block text-white fs-5 py-3 border-bottom border-secondary text-decoration-none" x-text="t[lang].navHome"></a>
      <a href="#about" @click="mobileMenuOpen = false" class="d-block text-white fs-5 py-3 border-bottom border-secondary text-decoration-none" x-text="t[lang].navAbout"></a>
      <a href="#services" @click="mobileMenuOpen = false" class="d-block text-white fs-5 py-3 border-bottom border-secondary text-decoration-none" x-text="t[lang].navServices"></a>
      <a href="#contact" @click="mobileMenuOpen = false" class="d-block text-white fs-5 py-3 text-decoration-none" x-text="t[lang].navContact"></a>
      <button @click="toggleLang(); mobileMenuOpen = false" class="lang-toggle w-100 mt-4 py-2 fs-5">
        <span x-show="lang === 'en'">تغيير للغة العربية</span>
        <span x-show="lang === 'ar'">Switch to English</span>
      </button>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="home" class="hero">
    <div class="container hero-content text-center text-md-start">
      <div class="row">
        <div class="col-lg-8">
          <h1 x-html="t[lang].heroTitle"></h1>
          <p class="mt-4 mb-5 text-light fs-5" x-text="t[lang].heroDesc"></p>
          <a href="#contact" class="btn-custom text-decoration-none fs-5">
            <i class="bi bi-fire me-2"></i> <span x-text="t[lang].heroBtn"></span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- About Section -->
  <section id="about" class="py-5" style="background: var(--dark-bg);">
    <div class="container py-4 py-md-5">
      <div class="row align-items-center gy-5">
        <div class="col-lg-5 text-center">
          <div class="position-relative d-inline-block">
            <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?q=80&w=800&auto=format&fit=crop" loading="lazy" class="img-fluid rounded-3 shadow-lg" alt="Coach Hany">
            <div class="position-absolute bottom-0 end-0 p-3 p-md-4 rounded-start" style="background: var(--primary-color);">
              <h3 class="fw-bold m-0 text-white fs-4 fs-md-3" x-text="t[lang].expYears"></h3>
            </div>
          </div>
        </div>
        <div class="col-lg-6 offset-lg-1 text-center text-md-start">
          <h2 class="section-title" x-text="t[lang].navAbout"></h2>
          <h3 class="mb-4" x-text="t[lang].aboutTitle" style="color: var(--primary-color);"></h3>
          <p class="fs-6 fs-md-5 text-secondary" x-text="t[lang].aboutDesc1"></p>
          <p class="fs-6 fs-md-5 text-secondary mb-4" x-text="t[lang].aboutDesc2"></p>
          <ul class="list-unstyled fs-6 fs-md-5 text-start d-inline-block d-md-block">
            <li class="mb-3"><i class="bi bi-check-circle-fill text-danger me-2"></i> <span x-text="t[lang].feat1"></span></li>
            <li class="mb-3"><i class="bi bi-check-circle-fill text-danger me-2"></i> <span x-text="t[lang].feat2"></span></li>
            <li class="mb-3"><i class="bi bi-check-circle-fill text-danger me-2"></i> <span x-text="t[lang].feat3"></span></li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <!-- Services Section -->
  <section id="services" class="py-5" style="background: var(--card-bg);">
    <div class="container py-4 py-md-5 text-center">
      <h2 class="section-title" x-text="t[lang].navServices"></h2>
      <div class="row gy-4 mt-3">
        <template x-for="(srv, i) in t[lang].services" :key="i">
          <div class="col-lg-4 col-md-6">
            <div class="service-card">
              <div class="service-icon" x-html="srv.icon"></div>
              <h4 class="fw-bold mb-3" x-text="srv.title"></h4>
              <p class="text-secondary mb-0" x-text="srv.desc"></p>
            </div>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- Workout Gallery -->
  <section id="gallery" class="py-5" style="background: var(--dark-bg);">
    <div class="container py-4 py-md-5 text-center">
      <h2 class="section-title" x-text="t[lang].navGallery"></h2>
      <div class="row mt-4">
        <div class="col-12 col-md-6 col-lg-4 gallery-item"><img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=600" loading="lazy" class="gallery-img"></div>
        <div class="col-12 col-md-6 col-lg-4 gallery-item"><img src="https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?q=80&w=600" loading="lazy" class="gallery-img"></div>
        <div class="col-12 col-md-6 col-lg-4 gallery-item"><img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=600" loading="lazy" class="gallery-img"></div>
        <div class="col-12 col-md-6 col-lg-4 gallery-item"><img src="https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?q=80&w=600" loading="lazy" class="gallery-img"></div>
        <div class="col-12 col-md-6 col-lg-4 gallery-item"><img src="https://images.unsplash.com/photo-1574680096145-d05b474e2155?q=80&w=600" loading="lazy" class="gallery-img"></div>
        <div class="col-12 col-md-6 col-lg-4 gallery-item"><img src="https://eifacademy.com/wp-content/uploads/2025/04/Personal-Trainer-Training-Partner-GettyImages-654427364-2.webp" loading="lazy" class="gallery-img"></div>
      </div>
    </div>
  </section>

  <!-- Contact / WhatsApp Form -->
  <section id="contact" class="py-5" style="background: var(--card-bg);">
    <div class="container py-4 py-md-5">
      <div class="row justify-content-center">
        <div class="col-lg-8 text-center">
          <h2 class="section-title" x-text="t[lang].navContact"></h2>
          <p class="mb-4 fs-6 fs-md-5 text-secondary" x-text="t[lang].contactSub"></p>
          
          <form @submit.prevent="sendToWhatsApp" class="text-start mt-4">
            <div class="row gy-3 gy-md-4">
              <div class="col-12 col-md-6">
                <label class="fw-bold mb-2" x-text="t[lang].formName"></label>
                <input type="text" x-model="form.name" class="form-control" required>
              </div>
              <div class="col-12 col-md-6">
                <label class="fw-bold mb-2" x-text="t[lang].formGoal"></label>
                <select x-model="form.goal" class="form-control" required>
                  <option value="" disabled selected x-text="t[lang].goalSelect"></option>
                  <option x-text="t[lang].goal1"></option>
                  <option x-text="t[lang].goal2"></option>
                  <option x-text="t[lang].goal3"></option>
                </select>
              </div>
              <div class="col-12">
                <label class="fw-bold mb-2" x-text="t[lang].formMsg"></label>
                <textarea x-model="form.message" class="form-control" rows="4" required></textarea>
              </div>
              <div class="col-12 text-center mt-4 mt-md-5">
                <button type="submit" class="btn btn-whatsapp w-100 fs-5 py-3">
                  <i class="bi bi-whatsapp fs-4 align-middle"></i> <span x-text="t[lang].sendBtn" class="align-middle ms-1"></span>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-5 text-center" style="background: #000;">
    <div class="container">
      <h3 class="fw-bold text-uppercase mb-3" style="color: var(--primary-color);" x-text="t[lang].logo"></h3>
      <div class="d-flex justify-content-center gap-4 my-4">
        <a href="#" class="text-white fs-3"><i class="bi bi-instagram"></i></a>
        <a href="#" class="text-white fs-3"><i class="bi bi-tiktok"></i></a>
        <a href="#" class="text-white fs-3"><i class="bi bi-facebook"></i></a>
      </div>
      <p class="text-secondary m-0 fs-6">
        &copy; <span x-text="new Date().getFullYear()"></span> <strong x-text="t[lang].logo"></strong>. <span x-text="t[lang].rights"></span>
      </p>
    </div>
  </footer>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('fitnessApp', () => ({
        lang: 'ar',
        mobileMenuOpen: false, 
        whatsappNumber: '201211934816', // <=== ضع رقم الواتساب الخاص بك هنا
        
        form: { name: '', goal: '', message: '' },

        t: {
          ar: {
            logo: 'كابتن هاني',
            navHome: 'الرئيسية',
            navAbout: 'عن الكابتن',
            navServices: 'الخدمات',
            navGallery: 'المعرض',
            navContact: 'تواصل معي',
            heroTitle: 'غيّر جسمك،<br><span>غيّر حياتك!</span>',
            heroDesc: 'أنا هنا لمساعدتك للوصول إلى أفضل نسخة من نفسك من خلال تدريب احترافي وخطط تغذية مخصصة.',
            heroBtn: 'ابدأ التحدي الآن',
            expYears: '+7 سنوات خبرة',
            aboutTitle: 'لا توجد أعذار، فقط نتائج.',
            aboutDesc1: 'أنا كابتن هاني، مدرب شخصي معتمد وخبير تغذية رياضية. هدفي ليس فقط تغيير شكل جسمك، بل تغيير نمط حياتك بالكامل ليكون صحياً وقوياً.',
            aboutDesc2: 'عملت مع مئات المتدربين للوصول لأهدافهم سواء بخسارة الوزن، بناء العضلات، أو تحسين اللياقة العامة.',
            feat1: 'تدريب مبني على أسس علمية',
            feat2: 'متابعة دورية وتحفيز مستمر',
            feat3: 'خطط مرنة تناسب أسلوب حياتك',
            services: [
              { icon: '<i class="bi bi-person-arms-up"></i>', title: 'التدريب الشخصي (PT)', desc: 'تدريب مباشر في الجيم مع متابعة دقيقة للتكنيك والأداء لضمان أفضل نتيجة بدون إصابات.' },
              { icon: '<i class="bi bi-apple"></i>', title: 'خطط التغذية', desc: 'برامج غذائية محسوبة السعرات، مصممة خصيصاً لتناسب هدفك وطبيعة جسمك بأسلوب لذيذ ومرن.' },
              { icon: '<i class="bi bi-laptop"></i>', title: 'التدريب الأونلاين', desc: 'برنامج تدريبي وتغذوي متكامل أينما كنت، مع متابعة أسبوعية عبر الواتساب وتقييم مستمر.' }
            ],
            contactSub: 'أرسل لي بياناتك وسأتواصل معك لنبدأ رحلة التغيير.',
            formName: 'الاسم بالكامل',
            formGoal: 'هدفك الرياضي',
            goalSelect: 'اختر هدفك...',
            goal1: 'خسارة الوزن / التنشيف',
            goal2: 'بناء العضلات / التضخيم',
            goal3: 'تحسين اللياقة والصحة العامة',
            formMsg: 'تفاصيل إضافية (الوزن، الطول، أو أي إصابات)',
            sendBtn: 'إرسال لـ واتساب',
            rights: 'جميع الحقوق محفوظة.'
          },
          en: {
            logo: 'COACH HANY',
            navHome: 'Home',
            navAbout: 'About',
            navServices: 'Services',
            navGallery: 'Gallery',
            navContact: 'Contact',
            heroTitle: 'TRANSFORM YOUR BODY,<br><span>TRANSFORM YOUR LIFE!</span>',
            heroDesc: 'I am here to help you reach the best version of yourself through professional training and custom nutrition plans.',
            heroBtn: 'START YOUR JOURNEY',
            expYears: '7+ Years Exp.',
            aboutTitle: 'No Excuses, Just Results.',
            aboutDesc1: 'I am Coach Hany, a certified personal trainer and sports nutritionist. My goal isn\'t just to change your physique, but to build a strong, healthy lifestyle.',
            aboutDesc2: 'I have helped hundreds of clients achieve their goals, whether it is fat loss, muscle building, or overall fitness.',
            feat1: 'Science-based training methods',
            feat2: 'Continuous tracking & motivation',
            feat3: 'Flexible plans that fit your lifestyle',
            services: [
              { icon: '<i class="bi bi-person-arms-up"></i>', title: 'Personal Training', desc: 'In-person coaching focusing on perfect form, intensity, and injury prevention.' },
              { icon: '<i class="bi bi-apple"></i>', title: 'Nutrition Plans', desc: 'Customized macro-calculated meal plans that are healthy, delicious, and goal-oriented.' },
              { icon: '<i class="bi bi-laptop"></i>', title: 'Online Coaching', desc: 'Full workout and diet programs wherever you are, with weekly WhatsApp check-ins.' }
            ],
            contactSub: 'Send me your details and let\'s start your transformation journey.',
            formName: 'Full Name',
            formGoal: 'Fitness Goal',
            goalSelect: 'Select your goal...',
            goal1: 'Weight Loss / Fat Burning',
            goal2: 'Muscle Building / Bulking',
            goal3: 'General Fitness & Health',
            formMsg: 'Extra details (Weight, Height, Injuries?)',
            sendBtn: 'Send to WhatsApp',
            rights: 'All rights reserved.'
          }
        },

        init() {
          this.applyLang();
          this.$watch('lang', () => this.applyLang());
        },
        toggleLang() {
          this.lang = this.lang === 'en' ? 'ar' : 'en';
        },
        applyLang() {
          document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
          document.documentElement.lang = this.lang;
        },
        sendToWhatsApp() {
          if (!this.form.name || !this.form.goal || !this.form.message) return;
          
          let text = this.lang === 'ar' 
            ? `مرحباً كابتن هاني، 💪\n\n*الاسم:* ${this.form.name}\n*الهدف الرياضي:* ${this.form.goal}\n*التفاصيل:*\n${this.form.message}`
            : `Hello Coach Hany, 💪\n\n*Name:* ${this.form.name}\n*Fitness Goal:* ${this.form.goal}\n*Details:*\n${this.form.message}`;

          window.open(`https://wa.me/${this.whatsappNumber}?text=${encodeURIComponent(text)}`, '_blank');
        }
      }));
    });
  </script>
</body>
</html>
